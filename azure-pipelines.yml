trigger:
- main

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self

# Step 1: Install dependencies (will work when you add package.json)
- script: |
    echo "Installing dependencies..."
    npm install
  displayName: "Install dependencies"

# Step 2: Run your application
- script: |
    echo "Running app.js"
    node app.js
  displayName: "Run JavaScript"
