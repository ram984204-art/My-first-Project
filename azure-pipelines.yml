trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node'

- script: |
    npm install
  displayName: 'Install dependencies'

- script: |
    node -e "console.log('Running basic validation ✅')"
  displayName: 'Validation step'
``
